name: TruffleHog Full Repository Scan

on:
  workflow_dispatch:
    inputs:
      scan_type:
        description: "Scan Type"
        required: true
        default: "full-repo"
        type: choice
        options:
          - full-repo

jobs:
  full-security-scan:
    name: Full Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # Full git history for complete scanning

      - name: Full Repository Scan
        if: inputs.scan_type == 'full-repo'
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70 # v3.95.6
        with:
          extra_args: --results=verified,unknown
