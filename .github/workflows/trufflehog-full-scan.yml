name: TruffleHog Full Repository Scan

on:
  workflow_dispatch:
    inputs:
      scan_type:
        description: "Scan Type"
        required: true
        default: "full-repo"
        type: choice
        options:
          - full-repo

jobs:
  full-security-scan:
    name: Full Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # Full git history for complete scanning

      - name: Full Repository Scan
        if: inputs.scan_type == 'full-repo'
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          extra_args: --results=verified,unknown
